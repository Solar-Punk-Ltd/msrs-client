server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    server_tokens off;
    client_max_body_size 1m;
    client_body_buffer_size 128k;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https: wss:; media-src 'self' https: blob:; object-src 'none'; frame-ancestors 'self'; base-uri 'self'; form-action 'self';" always;

    # Main app location
    location / {
        limit_req zone=general burst=50 nodelay;
        limit_conn perip 20;
        try_files $uri $uri/ /index.html;
    }

    # JavaScript files
    location ~ \.(js|mjs)$ {
        limit_req zone=assets burst=100 nodelay;
        limit_conn perip 50;
        access_log off;
        
        # Force correct MIME type with 'always' flag
        add_header Content-Type "application/javascript; charset=utf-8" always;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # CSS files
    location ~ \.css$ {
        limit_req zone=assets burst=100 nodelay;
        limit_conn perip 50;
        access_log off;
        
        add_header Content-Type "text/css; charset=utf-8" always;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
    }
    
    # HTML files
    location ~ \.html$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    # JSON files (for chunk manifests, etc.)
    location ~ \.json$ {
        add_header Content-Type "application/json; charset=utf-8" always;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    # Images and fonts
    location ~ \.(png|jpg|jpeg|gif|svg|ico|woff2?|ttf|eot|otf|webp)$ {
        limit_req zone=assets burst=150 nodelay;
        limit_conn perip 50;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Media files
    location ~ \.(mp4|m3u8|ts)$ {
        limit_req zone=streaming burst=500 nodelay;
        limit_conn perip 100;
        access_log off;
        add_header Cache-Control "no-store" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Accept-Ranges bytes always;
    }

    # Block hidden files except .well-known
    location ~ /\.(?!well-known) {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Block sensitive files
    location ~ ^/(config\.js|\.env|package\.json|package-lock\.json)$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Error pages
    error_page 404 /index.html;
    error_page 403 /index.html;

    # Rate limit error page
    error_page 429 /429.html;
    location = /429.html {
        internal;
        add_header Content-Type text/html always;
        return 429 '<html><body><h1>Too Many Requests</h1><p>Please slow down and try again.</p></body></html>';
    }
}