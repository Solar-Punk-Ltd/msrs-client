limit_req_zone $binary_remote_addr zone=general:10m rate=250r/s;
limit_req_zone $binary_remote_addr zone=assets:10m rate=500r/s;
limit_req_zone $binary_remote_addr zone=streaming:10m rate=1000r/s;
limit_conn_zone $binary_remote_addr zone=perip:10m;

server {
    listen 80 reuseport;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    server_tokens off;
    client_max_body_size 1m;
    client_body_buffer_size 128k;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https: wss:; media-src 'self' https: blob:; object-src 'none'; frame-ancestors 'self'; base-uri 'self'; form-action 'self';" always;

    types {
        application/javascript js mjs;
        text/css css;
        text/html html;
        application/json json;
    }

    location / {
        limit_req zone=general burst=50 nodelay;
        limit_conn perip 20;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    location ~* \.(js|mjs)$ {
        limit_req zone=assets burst=100 nodelay;
        limit_conn perip 50;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header Content-Type "application/javascript; charset=utf-8";
        add_header X-Content-Type-Options "nosniff" always;
    }

    location ~* \.(css)$ {
        limit_req zone=assets burst=100 nodelay;
        limit_conn perip 50;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header Content-Type "text/css; charset=utf-8";
        add_header X-Content-Type-Options "nosniff" always;
    }

    location ~* \.(png|jpg|jpeg|gif|svg|ico|woff2?|ttf|eot|otf|webp)$ {
        limit_req zone=assets burst=150 nodelay;
        limit_conn perip 50;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Content-Type-Options "nosniff" always;
    }

    location ~* \.(mp4|m3u8|ts)$ {
        limit_req zone=streaming burst=500 nodelay;
        limit_conn perip 100;
        access_log off;
        add_header Cache-Control "no-store";
        add_header X-Content-Type-Options "nosniff" always;
        add_header Accept-Ranges bytes;
    }

    location ~ /\.(?!well-known) {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ ^/(config\.js|\.env|package\.json|package-lock\.json)$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    error_page 404 /index.html;
    error_page 403 /index.html;

    error_page 429 /429.html;
    location = /429.html {
        internal;
        add_header Content-Type text/html;
        return 429 '<html><body><h1>Too Many Requests</h1><p>Please slow down and try again.</p></body></html>';
    }
}
