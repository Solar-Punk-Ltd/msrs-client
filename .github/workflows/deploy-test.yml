name: Build and Deploy Client to Test VPS (Docker)

on:
  push:
    branches:
      - test
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: Test

    env:
      IMAGE_NAME: mssd-client
      IMAGE_TAR: mssd-client.tar

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Generate .env file for Vite
        run: |
          echo "VITE_READER_BEE_URL=${{ secrets.VITE_READER_BEE_URL }}" >> .env
          echo "VITE_WRITER_BEE_URL=${{ secrets.VITE_WRITER_BEE_URL }}" >> .env
          echo "VITE_APP_OWNER=${{ secrets.VITE_APP_OWNER }}" >> .env
          echo "VITE_STAMP=${{ secrets.VITE_STAMP }}" >> .env
          echo "VITE_APP_RAW_TOPIC=${{ secrets.VITE_APP_RAW_TOPIC }}" >> .env
          echo "VITE_CHAT_GSOC_RESOURCE_ID=${{ secrets.VITE_CHAT_GSOC_RESOURCE_ID }}" >> .env
          echo "VITE_CHAT_GSOC_TOPIC=${{ secrets.VITE_CHAT_GSOC_TOPIC }}" >> .env

      - name: Build project
        run: pnpm build

      - name: Build Docker image
        run: docker build -t $IMAGE_NAME .

      - name: Save Docker image to tar
        run: docker save -o $IMAGE_TAR $IMAGE_NAME

      - name: Fix permissions on tar file
        run: chmod 644 mssd-client.tar

      - name: Copy image to VPS
        uses: appleboy/scp-action@v0.1.5
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: ${{ env.IMAGE_TAR }}
          target: '~/'

      - name: Deploy Docker image on VPS
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            docker stop mssd-client || true
            docker rm mssd-client || true
            docker rmi mssd-client || true
            docker load -i ~/mssd-client.tar
            docker run -d --name mssd-client -p 8080:80 mssd-client
