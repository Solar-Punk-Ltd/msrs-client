<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" id="favicon" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0 maximum-scale=1" />
    <title>Streaming Platform</title>

    <script src="/config.js"></script>
    <script>
      // Theme detection - runs before React to prevent flash
      (function () {
        const THEME_STORAGE_KEY = 'msrs-theme';

        // Determine initial theme (same priority as ThemeProvider)
        let theme = localStorage.getItem(THEME_STORAGE_KEY);
        if (theme !== 'solarpunk' && theme !== 'cryptomondays') {
          if (window.__CONFIG__ && window.__CONFIG__.VITE_THEME) {
            theme = window.__CONFIG__.VITE_THEME;
          } else {
            // Fallback to build-time replacement
            theme = '%VITE_THEME%';
          }
          if (theme !== 'solarpunk' && theme !== 'cryptomondays') {
            theme = 'cryptomondays';
          }
        }

        document.documentElement.setAttribute('data-theme', theme);

        const themeConfig = {
          solarpunk: {
            title: 'Multimedia Streaming over Swarm',
            favicon: '/assets/themes/solarpunk/favicon.png',
            loadingGradient: 'linear-gradient(180deg, #8841e4 0%, #ff8a50 100%)',
          },
          cryptomondays: {
            title: 'CryptoMondays Streaming',
            favicon: '/assets/themes/cryptomondays/logo-icon.svg',
            loadingGradient: 'linear-gradient(180deg, rgba(0, 0, 0, 0.85) 0%, rgba(8, 4, 27, 0.95) 100%)',
          },
        };

        const config = themeConfig[theme];

        document.title = config.title;
        document.getElementById('favicon').href = config.favicon;

        // Store loading gradient for CSS
        window.__THEME_LOADING_GRADIENT__ = config.loadingGradient;
      })();
    </script>
    <style>
      .initial-loading {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        /* Will be set by inline script above */
        background: var(--loading-gradient, linear-gradient(180deg, rgba(0, 0, 0, 0.85) 0%, rgba(8, 4, 27, 0.95) 100%));
        z-index: 9999;
      }

      .react-loaded .initial-loading {
        display: none;
      }
    </style>
    <script>
      // Apply loading gradient immediately
      if (window.__THEME_LOADING_GRADIENT__) {
        document.documentElement.style.setProperty('--loading-gradient', window.__THEME_LOADING_GRADIENT__);
      }
    </script>
  </head>
  <body>
    <div id="root">
      <div class="initial-loading"></div>
    </div>
    <script type="module" src="/src/App.tsx"></script>
  </body>
</html>
